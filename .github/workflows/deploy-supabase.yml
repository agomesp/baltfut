name: Deploy Supabase

# Manual trigger: push DB migrations + the cast-vote / cast-bracket functions.
# Requires these repository secrets:
#   SUPABASE_ACCESS_TOKEN   - personal access token (account -> Access Tokens)
#   SUPABASE_PROJECT_REF    - project ref (Project Settings -> General)
#   SUPABASE_DB_PASSWORD    - database password
#   VOTE_IP_PEPPER          - long random string; salts the IP hash
#   ALLOWED_ORIGINS         - comma-separated site origins (e.g. https://<user>.github.io)
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push database migrations
        run: supabase db push

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            VOTE_IP_PEPPER="${{ secrets.VOTE_IP_PEPPER }}" \
            ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}"

      - name: Deploy cast-vote function
        run: supabase functions deploy cast-vote

      - name: Deploy cast-bracket function
        run: supabase functions deploy cast-bracket
