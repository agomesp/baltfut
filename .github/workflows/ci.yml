name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint -- --max-warnings 0
      - run: npm run typecheck
      - run: npm test
      # Builds without Supabase env: the site degrades gracefully (scores still
      # render, voting hidden), so this proves the static export always works.
      - run: npm run build

  database:
    name: RLS security assertions
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Apply roles, migrations, then assert RLS
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -f scripts/db/rls_roles.sql
          for f in supabase/migrations/*.sql; do
            echo "::group::applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done
          psql -v ON_ERROR_STOP=1 -f scripts/db/rls_assertions.sql

  edge:
    name: Edge function type-check (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno check
        working-directory: supabase/functions
        run: deno check cast-vote/index.ts
