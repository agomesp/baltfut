name: Update promos

# Refresh the RB Store promo feed from the PUBLIC Telegram channel into the
# Supabase `promos` table (via the set_promos RPC). No git commit → NO Pages
# deploy → open viewers do NOT reload; the page picks up new deals on its next
# poll. See docs/telegram-spike.md.
#
# Requires repo secrets:
#   NEXT_PUBLIC_SUPABASE_URL      (already set)
#   SUPABASE_SERVICE_ROLE_KEY     (ADD THIS — Supabase → Settings → API → service_role)
on:
  schedule:
    - cron: "17 */2 * * *" # every 2 hours (cheap now — no deploy per refresh)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: promos
  cancel-in-progress: true

jobs:
  pull:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/telegram-pull.mjs
